<!DOCTYPE html>

<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PErsonalised Greeting Card</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        
        <div class="container">

                <h1>Personal Greeting Card</h1>

                <div class="card-preview">

                    <img src="/src/bbb.jpg" alt="card background" id="cardImage">

                    <div class="card-text">

                        <h2 id="greetng">Happy BirthDay!</h2>

                        <p id="message">Wish you all the best on this special day!</p>

                        <p id="signature">from your friends</p>

                    </div>

                </div>

                <div class="control">

                    <input type="text" placeholder="Enter a name(Ex: safari..)" name="name" id="nameInput">

                    <input type="text" placeholder="Enter your message(Ex: Happy Bithdat!)" name="name" id="messageInput">

                    <input type="text" placeholder="Enter a card style(Ex: Birthday, Love, Game)" name="name" id="styleInput">

                    <button id="generateBtn">Generate Card</button>

                    <button id="randomBtn">Random Card</button>

                </div>

                <p id="status">Ready to create!</p>
                    
        </div>

    </body>

</html>

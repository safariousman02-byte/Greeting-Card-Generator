<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalised Greeting Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Personal Greeting Card</h1>

        <div class="card-preview">
            <!-- FIXED: Removed / from src path -->
            <img src="src/bbb.jpg" width="400px" height="300px" alt="card background" id="cardImage">
            
            <div class="card-text">
                <!-- FIXED: Changed greetng to greeting -->
                <h2 id="greeting">Happy Birthday!</h2>
                <p id="message">Wish you all the best on this special day!</p>
                <p id="signature">from your friends</p>
            </div>
        </div>

        <!-- FIXED: Changed control to controls -->
        <div class="controls">
            <input type="text" placeholder="Enter a name (Ex: Safari..)" id="nameInput">
            <input type="text" placeholder="Enter your message (Ex: Happy Birthday!)" id="messageInput">
            <input type="text" placeholder="Enter a card style (Ex: Birthday, Love, Game)" id="styleInput">
            <button id="generateBtn">Generate Card</button>
            <button id="randomBtn">Random Card</button>
        </div>

        <p id="status">Ready to create!</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
